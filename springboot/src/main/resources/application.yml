server:
  port: 9090

# 数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/code2026?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  data:
    redis:
      host: localhost      # 或 127.0.0.1
      port: 6379
      password:            # 生产环境建议设置密码
      database: 0          # 保持与现有一致，避免数据混乱
      timeout: 10s
#      lettuce:
#        pool:
#          max-active: 200
#          max-wait: -1ms
#          max-idle: 10
#          min-idle: 0

# 配置mybatis实体和xml映射
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# application.yml
order:
  timeout-minutes: 5  # 订单超时时间（分钟）

fileBaseUrl: http://localhost:9090

sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: load_token
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效 3600 * 24 = 1天
  timeout: 86400
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: false
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: simple-uuid
  # 是否输出操作日志
  is-log: true
  is-read-header: true    # 是否从请求头读取 token
  is-read-cookie: true    # 是否从 Cookie 读取 token
